<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PATRAK</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(to bottom right, #ffffff, #A7EBF2, #3FA9F5); /* blue-white gradient */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: #023859;
}

/* Large Circular Logo */
.logo img {
  width: 380px;   /* bigger size */
  height: 380px;
  border-radius: 50%;
  object-fit: cover;
  border: 12px solid #54ACBF;
  box-shadow: 0 18px 45px rgba(0,0,0,0.25);
  margin-bottom: 40px;
}

/* Tagline */
.tagline {
  font-size: 30px;
  font-weight: 600;
  margin-bottom: 50px;
  color: #023859;
}

/* Buttons */
.buttons {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
}

button {
  padding: 20px 50px;
  font-size: 18px;
  border: none;
  border-radius: 35px;
  background: #54ACBF;
  color: white;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}
button:hover {
  background: #26658C;
  transform: translateY(-5px);
}
</style>
</head>

<body>

<!-- Logo -->
<div class="logo">
  <img src="images/patraklogo.png" alt="PATRAK Logo">
</div>

<!-- Tagline -->
<div class="tagline">
  Patient Appointment, Token & Registration System
</div>

<!-- Buttons -->
<div class="buttons">
  <button onclick="openRegister()">Patient Registration</button>
  <button onclick="openHistory()">Patient History</button>
  <button onclick="openToken()">Live Token Screen</button>
</div>

<script>
function openRegister(){
  window.location.href="register.html";
}
function openHistory(){
  window.location.href="patientHistory.html";
}
function openToken(){
  window.location.href="token.html";
}
</script>

</body>
</html>
